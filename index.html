<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interaktivní příběh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2e2e35;
    --bg2: #383840;
    --bg3: #424249;
    --parchment: #fdf0f8;
    --ink: #1a1a1f;
    --amber: #f07ab8;
    --amber-glow: #ff99cc;
    --ember: #c94d8a;
    --mist: rgba(240,122,184,0.10);
    --border: rgba(240,122,184,0.32);
    --choice-bg: rgba(240,122,184,0.09);
    --choice-hover: rgba(240,122,184,0.20);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--parchment);
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Ambient background effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(240,122,184,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 50% 70% at 15% 90%, rgba(240,122,184,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 55% at 88% 35%, rgba(240,122,184,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 0 1.5rem;
  }

  /* ── Header ── */
  header {
    padding: 3.5rem 0 2rem;
    text-align: center;
  }

  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--amber-glow);
    letter-spacing: 0.04em;
    text-shadow: 0 0 40px rgba(224,111,160,0.5), 0 0 80px rgba(180,60,120,0.25);
    line-height: 1.2;
  }

  .story-subtitle {
    margin-top: 0.5rem;
    font-style: italic;
    font-size: 1rem;
    color: rgba(242,200,224,0.4);
    letter-spacing: 0.08em;
  }

  .ornament {
    margin: 1.2rem auto 0;
    color: var(--amber);
    opacity: 0.5;
    font-size: 1.1rem;
    letter-spacing: 0.5em;
  }

  /* ── Progress & breadcrumb ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: rgba(242,200,224,0.3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
  }

  .breadcrumb span { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span:hover { color: var(--amber); }
  .breadcrumb .sep { opacity: 0.3; user-select: none; }
  .breadcrumb .current { color: rgba(242,200,224,0.55); cursor: default; }

  /* ── Scene card ── */
  .scene-card {
    background: linear-gradient(160deg, #42424e 0%, #38383f 100%);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2.8rem 3rem;
    position: relative;
    animation: fadeSlide 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    box-shadow:
      0 0 0 1px rgba(224,111,160,0.05) inset,
      0 8px 40px rgba(0,0,0,0.7),
      0 0 60px rgba(180,60,120,0.07);
  }

  /* Corner decorations */
  .scene-card::before,
  .scene-card::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--amber);
    border-style: solid;
    opacity: 0.35;
  }
  .scene-card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .scene-card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-id {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--amber);
    opacity: 0.55;
    margin-bottom: 1.4rem;
  }

  .scene-text {
    font-size: clamp(1rem, 2.5vw, 1.18rem);
    line-height: 1.85;
    color: rgba(242,232,248,0.88);
    font-weight: 300;
  }

  .scene-text p + p { margin-top: 1.1em; }

  /* ── Choices ── */
  .choices-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.4rem 0 1.6rem;
  }

  .choices-divider::before,
  .choices-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .choices-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(224,111,160,0.5);
    white-space: nowrap;
  }

  .choices-list {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .choice-btn {
    background: var(--choice-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1rem 1.4rem 1rem 3.2rem;
    text-align: left;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    font-weight: 300;
    color: rgba(242,200,224,0.75);
    line-height: 1.5;
    position: relative;
    transition: all 0.22s ease;
    letter-spacing: 0.01em;
  }

  .choice-btn::before {
    content: attr(data-num);
    position: absolute;
    left: 1.1rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--amber);
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .choice-btn::after {
    content: '→';
    position: absolute;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    opacity: 0;
    color: var(--amber-glow);
    font-size: 1rem;
    transition: all 0.22s ease;
  }

  .choice-btn:hover {
    background: var(--choice-hover);
    border-color: rgba(224,111,160,0.5);
    color: var(--parchment);
    transform: translateX(4px);
  }

  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:hover::after  { opacity: 1; transform: translateY(-50%) translateX(0); }

  /* ── Ending card ── */
  .ending-badge {
    display: inline-block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--amber);
    border: 1px solid var(--border);
    padding: 0.3em 0.8em;
    border-radius: 1px;
    margin-bottom: 1.4rem;
  }

  /* ── Navigation buttons ── */
  .nav-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid rgba(224,111,160,0.22);
    border-radius: 2px;
    padding: 0.6rem 1.2rem;
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(242,200,224,0.5);
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--amber);
    color: var(--amber-glow);
  }

  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  .nav-btn.restart {
    border-color: rgba(184,77,122,0.35);
    color: rgba(224,111,160,0.6);
  }
  .nav-btn.restart:hover {
    border-color: var(--ember);
    color: var(--ember);
  }

  footer {
    padding: 3rem 0 2rem;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(242,200,224,0.18);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #2e2e35; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #f07ab8, #c94d8a);
    border-radius: 6px;
    border: 2px solid #2e2e35;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #ff99cc, #e0609a);
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="story-title" id="storyTitle">Stíny Starého Mlýna</div>
    <div class="story-subtitle">Interaktivní příběh · Vaše volby tvoří příběh</div>
    <div class="ornament">✦ ✦ ✦</div>
  </header>

  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="sceneContainer"></div>

  <footer>Interaktivní příběh · Vytvořeno pomocí Claude</footer>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  PŘÍBĚHOVÁ DATA
//  Každá scéna má: id, title, text (HTML), choices nebo ending

const STORY = {
  title: "Sauna s trochou zábavy",

  scenes: {

    "start": {
      title: "Úvod",
      text: `<p>Už nějaký čas se bavíme o tom, ze zajdeme do soukromého wellnessu, konečně je tu víkend, kdy
                si naši odvezli děti do Děčína a my máme před sebou tři hodiny pohody. V duchu si říkáš, že by možná byla lepší saunie, protože v soukromí se budu o něco pokoušet, 
                ale už jsme si dlouho přádně nezašukali, tak si říkáš, že to přežiješ a wellnes je dobrý bonus.</p>
             <p>Přecejen bude pohoda, ujistil jsem tě, že máme raději dvě láhve proseca a něco na zub a užijeme si relax. 
             Nevíš přesně kam jedeme, wellness jsem objednával já. Takže jsi příjemně překvapená, že jsme zastavili u wellness Fenix,

      choices: [
        { text: "Máme čas, takže si nejdřív jdeme sednout ještě na bar.", next: "Posezení u baru" },
        { text: "Jdeme rovnou do wellness, už se těšíš, až se prohřeješ a dáš si k tomu prosecco", next: "Rovnou do wellness" }

    },

    "Posezení u baru": {
      title: "Pár skleniček a trochu provokace",
      text: `<p>Nakonec jsme dorazili dost brzy, takže jsme měli dost času, abychom poseděli a dali si pár skleniček.</p>
             <p>Prosecco ti celkem dost zachutnalo, tak jsi dala rychle po sobě 3 skleny a vyjímečně jsi byla celkem v dobré připité náladě.</p>
             <p>Rozhlížíš se po baru a vidíš hned několik fešáků kolem 30-35. Vidíš, že jeden tě pozoruje, i když se to snaží skrývat.</p>
             <p>Vzhledem k tomu, že jdeme do sauny, oblékla jsi se dost nalehko, jsi bez podprsenky, máš halenku s rozplým knoflíčkem tak,

             <p>Napadlo tě, že si trochu zaflirtuješ, rozepnula sis knoflíček a tvoje krásná prsa poodhalíš tak akorát, aby ještě nebylo nic vidět, 
             ale bylo jasné, co skrýváš.</p>`,
      choices: [
        { text: "Chlapík se chytne a vidíš, jak nemůže od tvého výstřihu odtrhnout oči.", next: "Flirt bar pokračování" },

             <p>Já vytahuju dvě skleničky a nalévám prosecco.</p>
             <p></p>
             <p></p>`,
      choices: [
        { text: "Rychlá sklenka a jdeme na první kolečko sauny.", next: "První sauna" },
        { text: "Chvíli popíjíme, uklidňuju tě, že nakonec máme zaplacené 4 hodiny, čili času máme dost.", next: "Rozpíjení v sauně." }

    "Do wellness z baru": {
      title: "Hezky rozpito a pokračujeme v sauně",
      text: `<p>Už při svlékání se trochu motáš, ale zatím jsi v příjemné náladě.</p>
             <p>Otevíráme první prosecco - vzal jsem i hezké skleničky.</p>
             <p></p>`,
choices: [
        { text: "První kolečko proběhlo skvěle, bazének a jdem relaxovat a popíjet.", next: "První kolo" },

    "Flirt bar pokračování": {
      title: "Pokračuješ v laškování",
      text: `<p>Vidíš, že se chytil a má pohled zabodnutý k tobě do výstřihu.</p>
             <p>Pomalu přehazuješ nohu přes nohu a jsi otočená směrem k němu.</p>
             <p></p>`,
      choices: [

    "mlyn_vchod_svicka": {

      text: `<p>Svíčka v tvé ruce vrhá teplý kruh světla na zem, jak kráčíš po stezce ke mlýnu. Budova se tyčí před tebou v mlze — dřevěné kolo nehybně trčí nad náhonem, vrata jsou zajištěna novým zámkem.</p>
             <p>Ale dveře vedle vrat jsou pootevřeny. Tvoje svíčka se náhle zachvěje, jako by proudil vzduch — ale vítr se přestal.</p>
             <p>Dovnitř proniká temnota. Záblesk světla, co hostinský zmínil? Teď tu není. Jen ticho a pach zápalek.</p>`,

    "mlyn_zavolat": {

             <p>Světlo — viděl jsi ho. Mžikal ze schodiště vedoucího do podkroví. Přesný, pravidelný rytmus, jako by někdo přikrýval a odkrýval svíčku.</p>

//  STAV APLIKACE
// ═══════════════════════════════════════════════════════════
let history = [];
let currentScene = "start";

// ═══════════════════════════════════════════════════════════
//  RENDEROVÁNÍ
// ═══════════════════════════════════════════════════════════
function renderScene(sceneId) {
  const scene = STORY.scenes[sceneId];
  if (!scene) return;

  currentScene = sceneId;
  document.getElementById('storyTitle').textContent = STORY.title;

  // Breadcrumb
  renderBreadcrumb();

  // Scene HTML
  const container = document.getElementById('sceneContainer');

  let choicesHTML = '';
  if (scene.ending) {
    choicesHTML = `
      <div style="margin-top:2rem; text-align:center;">
        <div class="ending-badge">${scene.ending}</div>
        <p style="font-style:italic; color:rgba(200,144,42,0.7); margin-top:0.5rem;">${scene.ending_note || ''}</p>
      </div>
    `;
  } else if (scene.choices && scene.choices.length) {
    const btns = scene.choices.map((c, i) => `
      <button class="choice-btn" data-num="${i + 1}." onclick="chooseOption('${c.next}')">
        ${c.text}
      </button>
    `).join('');
    choicesHTML = `
      <div class="choices-divider"><span class="choices-label">Co uděláš?</span></div>
      <div class="choices-list">${btns}</div>
    `;
  }

  container.innerHTML = `
    <div class="scene-card">
      <div class="scene-id">${scene.title || sceneId}</div>
      <div class="scene-text">${scene.text}</div>
      ${choicesHTML}
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()" ${history.length === 0 ? 'disabled' : ''}>← Zpět</button>
      <button class="nav-btn restart" onclick="restartStory()">↺ Začít znovu</button>
    </div>
  `;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (history.length === 0) { bc.innerHTML = ''; return; }

  const items = history.map((id, i) => {
    const sc = STORY.scenes[id];
    const label = sc ? sc.title : id;
    return `<span onclick="jumpToHistory(${i})">${label}</span><span class="sep">›</span>`;
  });

  const current = STORY.scenes[currentScene];
  items.push(`<span class="current">${current ? current.title : currentScene}</span>`);

  bc.innerHTML = items.join('');
}

// ═══════════════════════════════════════════════════════════
//  OVLÁDÁNÍ
// ═══════════════════════════════════════════════════════════
function chooseOption(nextId) {
  history.push(currentScene);
  renderScene(nextId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderScene(prev);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToHistory(index) {
  const targetId = history[index];
  history = history.slice(0, index);
  renderScene(targetId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartStory() {
  history = [];
  renderScene('start');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderScene('start');
</script>
