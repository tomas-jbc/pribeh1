}<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness se zápletkou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2e2e35;
    --bg2: #383840;
    --bg3: #424249;
    --parchment: #fdf0f8;
    --ink: #1a1a1f;
    --amber: #f07ab8;
    --amber-glow: #ff99cc;
    --ember: #c94d8a;
    --mist: rgba(240,122,184,0.10);
    --border: rgba(240,122,184,0.32);
    --choice-bg: rgba(240,122,184,0.09);
    --choice-hover: rgba(240,122,184,0.20);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--parchment);
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(240,122,184,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 50% 70% at 15% 90%, rgba(240,122,184,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 55% at 88% 35%, rgba(240,122,184,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 0 1.5rem;
  }

  header {
    padding: 3.5rem 0 2rem;
    text-align: center;
  }

  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--amber-glow);
    letter-spacing: 0.04em;
    text-shadow: 0 0 40px rgba(224,111,160,0.5), 0 0 80px rgba(180,60,120,0.25);
    line-height: 1.2;
  }

  .story-subtitle {
    margin-top: 0.5rem;
    font-style: italic;
    font-size: 1rem;
    color: rgba(242,200,224,0.4);
    letter-spacing: 0.08em;
  }

  .ornament {
    margin: 1.2rem auto 0;
    color: var(--amber);
    opacity: 0.5;
    font-size: 1.1rem;
    letter-spacing: 0.5em;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: rgba(242,200,224,0.3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
  }

  .breadcrumb span { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span:hover { color: var(--amber); }
  .breadcrumb .sep { opacity: 0.3; user-select: none; }
  .breadcrumb .current { color: rgba(242,200,224,0.55); cursor: default; }

  .scene-card {
    background: linear-gradient(160deg, #42424e 0%, #38383f 100%);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2.8rem 3rem;
    position: relative;
    animation: fadeSlide 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    box-shadow:
      0 0 0 1px rgba(224,111,160,0.05) inset,
      0 8px 40px rgba(0,0,0,0.7),
      0 0 60px rgba(180,60,120,0.07);
  }

  .scene-card::before,
  .scene-card::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--amber);
    border-style: solid;
    opacity: 0.35;
  }
  .scene-card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .scene-card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-id {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--amber);
    opacity: 0.55;
    margin-bottom: 1.4rem;
  }

  .scene-text {
    font-size: clamp(1rem, 2.5vw, 1.18rem);
    line-height: 1.85;
    color: rgba(242,232,248,0.88);
    font-weight: 300;
  }

  .scene-text p + p { margin-top: 1.1em; }

  .choices-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.4rem 0 1.6rem;
  }

  .choices-divider::before,
  .choices-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .choices-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(224,111,160,0.5);
    white-space: nowrap;
  }

  .choices-list {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .choice-btn {
    background: var(--choice-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1rem 1.4rem 1rem 3.2rem;
    text-align: left;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    font-weight: 300;
    color: rgba(242,200,224,0.75);
    line-height: 1.5;
    position: relative;
    transition: all 0.22s ease;
    letter-spacing: 0.01em;
  }

  .choice-btn::before {
    content: attr(data-num);
    position: absolute;
    left: 1.1rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--amber);
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .choice-btn::after {
    content: '→';
    position: absolute;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    opacity: 0;
    color: var(--amber-glow);
    font-size: 1rem;
    transition: all 0.22s ease;
  }

  .choice-btn:hover {
    background: var(--choice-hover);
    border-color: rgba(224,111,160,0.5);
    color: var(--parchment);
    transform: translateX(4px);
  }

  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:hover::after  { opacity: 1; transform: translateY(-50%) translateX(0); }

  .ending-badge {
    display: inline-block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--amber);
    border: 1px solid var(--border);
    padding: 0.3em 0.8em;
    border-radius: 1px;
    margin-bottom: 1.4rem;
  }

  .nav-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid rgba(224,111,160,0.22);
    border-radius: 2px;
    padding: 0.6rem 1.2rem;
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(242,200,224,0.5);
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--amber);
    color: var(--amber-glow);
  }

  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  .nav-btn.restart {
    border-color: rgba(184,77,122,0.35);
    color: rgba(224,111,160,0.6);
  }
  .nav-btn.restart:hover {
    border-color: var(--ember);
    color: var(--ember);
  }

  footer {
    padding: 3rem 0 2rem;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(242,200,224,0.18);
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #2e2e35; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #f07ab8, #c94d8a);
    border-radius: 6px;
    border: 2px solid #2e2e35;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #ff99cc, #e0609a);
  }

  /* ── Admin overlay ── */
  #adminOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,14,0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #adminOverlay.open { display: flex; }

  .admin-box {
    background: #242429;
    border: 1px solid rgba(240,122,184,0.35);
    border-radius: 4px;
    width: min(92vw, 820px);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(240,122,184,0.08);
    overflow: hidden;
  }

  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.6rem;
    border-bottom: 1px solid rgba(240,122,184,0.18);
    flex-shrink: 0;
  }

  .admin-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--amber-glow);
    letter-spacing: 0.05em;
  }

  .admin-close {
    background: none;
    border: 1px solid rgba(240,122,184,0.25);
    border-radius: 2px;
    color: rgba(240,180,220,0.6);
    font-size: 1rem;
    width: 2rem;
    height: 2rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .admin-close:hover { border-color: var(--amber); color: var(--amber-glow); }

  .admin-tabs {
    display: flex;
    border-bottom: 1px solid rgba(240,122,184,0.18);
    flex-shrink: 0;
  }

  .admin-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.75rem 1.4rem;
    font-family: 'Crimson Pro', serif;
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,180,220,0.45);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .admin-tab.active, .admin-tab:hover {
    color: var(--amber-glow);
    border-bottom-color: var(--amber);
  }

  .admin-body {
    overflow-y: auto;
    padding: 1.4rem 1.6rem;
    flex: 1;
  }

  .admin-stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.6rem;
  }

  .stat-card {
    background: rgba(240,122,184,0.07);
    border: 1px solid rgba(240,122,184,0.18);
    border-radius: 3px;
    padding: 1rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--amber-glow);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(240,180,220,0.45);
    margin-top: 0.3rem;
  }

  .admin-section-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(240,122,184,0.55);
    margin: 1.4rem 0 0.8rem;
    border-bottom: 1px solid rgba(240,122,184,0.12);
    padding-bottom: 0.4rem;
  }

  .choice-bar-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.55rem;
  }

  .choice-bar-label {
    flex: 1;
    color: rgba(253,240,248,0.75);
    font-size: 0.88rem;
    line-height: 1.3;
  }

  .choice-bar-wrap {
    width: 120px;
    height: 6px;
    background: rgba(240,122,184,0.12);
    border-radius: 3px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .choice-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f07ab8, #ff99cc);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .choice-bar-count {
    width: 2rem;
    text-align: right;
    color: var(--amber);
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .session-item {
    background: rgba(240,122,184,0.05);
    border: 1px solid rgba(240,122,184,0.14);
    border-radius: 3px;
    padding: 0.9rem 1rem;
    margin-bottom: 0.6rem;
  }

  .session-meta {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(240,122,184,0.5);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
  }

  .session-path {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    align-items: center;
  }

  .path-node {
    font-size: 0.8rem;
    background: rgba(240,122,184,0.1);
    border: 1px solid rgba(240,122,184,0.2);
    border-radius: 2px;
    padding: 0.15em 0.5em;
    color: rgba(253,240,248,0.7);
  }

  .path-node.ending {
    background: rgba(240,122,184,0.2);
    border-color: rgba(240,122,184,0.4);
    color: var(--amber-glow);
  }

  .admin-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(240,180,220,0.3);
    font-style: italic;
    font-size: 0.95rem;
  }

  .admin-clear-btn {
    background: none;
    border: 1px solid rgba(201,77,138,0.3);
    border-radius: 2px;
    color: rgba(201,77,138,0.6);
    font-family: 'Crimson Pro', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .admin-clear-btn:hover { border-color: #c94d8a; color: #c94d8a; }

  .admin-login {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 2.5rem;
  }

  .admin-login h3 {
    font-family: 'Playfair Display', serif;
    color: var(--amber-glow);
    font-size: 1.3rem;
  }

  .admin-login input {
    background: rgba(240,122,184,0.07);
    border: 1px solid rgba(240,122,184,0.3);
    border-radius: 2px;
    padding: 0.6rem 1rem;
    color: var(--parchment);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    width: 240px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .admin-login input:focus { border-color: var(--amber); }

  .admin-login button {
    background: rgba(240,122,184,0.12);
    border: 1px solid rgba(240,122,184,0.35);
    border-radius: 2px;
    color: var(--amber-glow);
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.55rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .admin-login button:hover { background: rgba(240,122,184,0.22); }

  .admin-login .error {
    color: #c94d8a;
    font-size: 0.85rem;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="story-title" id="storyTitle">Povídka pro Míšu</div>
    <div class="story-subtitle">Interaktivní povídka · Tvoje volby tvoří příběh</div>
    <div class="ornament">✦ ✦ ✦</div>
  </header>

  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="sceneContainer"></div>

  <footer>Interaktivní příběh · Vytvořeno s láskou</footer>
</div>

<!-- Skryté tlačítko pro admin (pravý dolní roh) -->
<button id="adminTrigger" onclick="openAdmin()" title="Admin" style="
  position: fixed; bottom: 1rem; right: 1rem;
  width: 2rem; height: 2rem;
  background: none; border: none;
  opacity: 0.08; cursor: pointer;
  font-size: 1.1rem; color: #f07ab8;
  transition: opacity 0.3s; z-index: 500;
" onmouseenter="this.style.opacity='0.5'" onmouseleave="this.style.opacity='0.08'">⚙</button>

<!-- Admin overlay -->
<div id="adminOverlay">
  <div class="admin-box">

    <div id="adminLogin" class="admin-login">
      <h3>Admin přístup</h3>
      <input type="password" id="adminPwdInput" placeholder="Heslo" onkeydown="if(event.key==='Enter') adminLogin()">
      <button onclick="adminLogin()">Vstoupit</button>
      <span id="adminErr" class="error" style="display:none">Špatné heslo</span>
      <button onclick="closeAdmin()" style="background:none;border:none;color:rgba(240,180,220,0.3);font-family:inherit;cursor:pointer;font-size:0.85rem;margin-top:0.5rem">Zrušit</button>
    </div>

    <div id="adminDash" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="admin-header">
        <h2>📊 Admin — Statistiky příběhu</h2>
        <button class="admin-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="showTab('overview', this)">Přehled</button>
        <button class="admin-tab" onclick="showTab('choices', this)">Volby</button>
        <button class="admin-tab" onclick="showTab('sessions', this)">Průchody</button>
      </div>
      <div class="admin-body">
        <div id="tab-overview">
          <div class="admin-stat-grid" id="statGrid"></div>
          <div class="admin-section-title">Nejpopulárnější volby</div>
          <div id="topChoices"></div>
        </div>
        <div id="tab-choices" style="display:none">
          <div class="admin-section-title">Všechny volby a počty kliknutí</div>
          <div id="allChoices"></div>
        </div>
        <div id="tab-sessions" style="display:none">
          <div class="admin-section-title">Historie průchodů příběhem</div>
          <div id="sessionsList"></div>
        </div>
        <button class="admin-clear-btn" onclick="clearLog()">🗑 Smazat všechna data</button>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  PŘÍBĚHOVÁ DATA
// ═══════════════════════════════════════════════════════════
const STORY = {
  title: "Povídka pro Míšu",

  scenes: {

    "start": {
      title: "Úvod",
      text: `<p>Už nějaký čas se bavíme o tom, že zajdeme do soukromého wellnessu, konečně je tu víkend, kdy
                si naši odvezli děti do Děčína a my máme před sebou tři hodiny pohody. V duchu si říkáš, že by možná byla lepší sauna,
                protože v soukromí se budu o něco pokoušet, ale už jsme si dlouho pořádně nezašukali, tak si říkáš, že to přežiješ a wellness je dobrý bonus.</p>
             <p>Přecejen bude pohoda, ujistil jsem tě, že máme raději dvě láhve prosecca a něco na zub a užijeme si relax.
             Nevíš přesně kam jedeme, wellness jsem objednával já. Takže jsi příjemně překvapená, že jsme zastavili u wellness Fenix,
             pod Ještědem, kam jsi se chtěla už dlouho podívat.</p>`,
      choices: [
        { text: "Máme čas, takže si nejdřív jdeme sednout ještě na bar.", next: "Posezení u baru" },
        { text: "Jdeme rovnou do wellness, už se těšíš, až se prohřeješ a dáš si k tomu prosecco.", next: "Rovnou do wellness" }
      ]
    },

    "Posezení u baru": {
      title: "Pár skleniček a trochu provokace",
      text: `<p>Nakonec jsme dorazili dost brzy, takže jsme měli dost času, abychom poseděli a dali si pár skleniček.</p>
             <p>Prosecco ti celkem dost zachutnalo, tak jsi dala rychle po sobě 3 sklenice a výjimečně jsi byla celkem v dobré připité náladě.</p>
             <p>Rozhlížíš se po baru a vidíš hned několik fešáků kolem 30–35. Vidíš, že jeden tě pozoruje, i když se to snaží skrývat.</p>
             <p>Vzhledem k tomu, že jdeme do sauny, oblékla jsi se dost nalehko, jsi bez podprsenky, máš halenku s rozepnutým knoflíčkem tak,
             že máš decentně odhalený výstřih. Dál máš růžovou sukni nad kolena.</p>
             <p>Napadlo tě, že si trochu zaflirtuješ, rozepnula sis knoflíček a tvoje krásná prsa poodhalíš tak akorát, aby ještě nebylo nic vidět,
             ale bylo jasné, co skrýváš.</p>`,

//  STAV APLIKACE
// ═══════════════════════════════════════════════════════════
let history = [];
let currentScene = "start";

// ═══════════════════════════════════════════════════════════
//  RENDEROVÁNÍ
// ═══════════════════════════════════════════════════════════
function renderScene(sceneId) {
  const scene = STORY.scenes[sceneId];
  if (!scene) return;

  currentScene = sceneId;
  document.getElementById('storyTitle').textContent = STORY.title;
  renderBreadcrumb();

  const container = document.getElementById('sceneContainer');
  let choicesHTML = '';

  if (scene.ending) {
    choicesHTML = `
      <div style="margin-top:2rem; text-align:center;">
        <div class="ending-badge">${scene.ending}</div>
        <p style="font-style:italic; color:rgba(240,122,184,0.7); margin-top:0.5rem;">${scene.ending_note || ''}</p>
      </div>
    `;
  } else if (scene.choices && scene.choices.length) {
    const btns = scene.choices.map((c, i) => `
      <button class="choice-btn" data-num="${i + 1}." onclick="chooseOption('${c.next}')">
        ${c.text}
      </button>
    `).join('');
    choicesHTML = `
      <div class="choices-divider"><span class="choices-label">Co uděláš?</span></div>
      <div class="choices-list">${btns}</div>
    `;
  }

  container.innerHTML = `
    <div class="scene-card">
      <div class="scene-id">${scene.title || sceneId}</div>
      <div class="scene-text">${scene.text}</div>
      ${choicesHTML}
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()" ${history.length === 0 ? 'disabled' : ''}>← Zpět</button>
      <button class="nav-btn restart" onclick="restartStory()">↺ Začít znovu</button>
    </div>
  `;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (history.length === 0) { bc.innerHTML = ''; return; }
  const items = history.map((id, i) => {
    const sc = STORY.scenes[id];
    return `<span onclick="jumpToHistory(${i})">${sc ? sc.title : id}</span><span class="sep">›</span>`;
  });
  const current = STORY.scenes[currentScene];
  items.push(`<span class="current">${current ? current.title : currentScene}</span>`);
  bc.innerHTML = items.join('');
}

// ═══════════════════════════════════════════════════════════
//  OVLÁDÁNÍ
// ═══════════════════════════════════════════════════════════
function chooseOption(nextId) {
  history.push(currentScene);
  renderScene(nextId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  renderScene(history.pop());
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToHistory(index) {
  const targetId = history[index];
  history = history.slice(0, index);
  renderScene(targetId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartStory() {
  history = [];
  activeSession = { start: new Date().toISOString(), steps: [] };
  renderScene('start');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
//  LOGOVÁNÍ
// ═══════════════════════════════════════════════════════════
const LOG_KEY = 'story_log_v1';

function getLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || { choices: {}, sessions: [] }; }
  catch { return { choices: {}, sessions: [] }; }
}
function saveLog(data) { localStorage.setItem(LOG_KEY, JSON.stringify(data)); }

let activeSession = { start: new Date().toISOString(), steps: [] };

const _origChoose = chooseOption;
window.chooseOption = function(nextId) {
  const scene = STORY.scenes[currentScene];
  const choiceObj = scene?.choices?.find(c => c.next === nextId);
  const step = {
    from: currentScene,
    fromTitle: scene?.title || currentScene,
    choiceText: choiceObj?.text || nextId,
    to: nextId,
    toTitle: STORY.scenes[nextId]?.title || nextId,
    time: new Date().toISOString()
  };
  activeSession.steps.push(step);

  const log = getLog();
  const key = `${currentScene}→${nextId}`;
  log.choices[key] = log.choices[key] || { fromTitle: step.fromTitle, toTitle: step.toTitle, text: step.choiceText, count: 0 };
  log.choices[key].count++;
  saveLog(log);

  _origChoose(nextId);

  const nextScene = STORY.scenes[nextId];
  if (nextScene?.ending) {
    activeSession.end = new Date().toISOString();
    activeSession.endTitle = nextScene.ending;
    const log2 = getLog();
    log2.sessions.unshift({ ...activeSession });
    if (log2.sessions.length > 200) log2.sessions = log2.sessions.slice(0, 200);
    saveLog(log2);
    activeSession = { start: new Date().toISOString(), steps: [] };
  }
};

//  ADMIN PANEL
// ═══════════════════════════════════════════════════════════
const ADMIN_PASSWORD = 'admin123'; // ← ZDE ZMĚŇ HESLO

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  document.getElementById('adminLogin').style.display = 'flex';
  document.getElementById('adminDash').style.display = 'none';
  document.getElementById('adminPwdInput').value = '';
  document.getElementById('adminErr').style.display = 'none';
  setTimeout(() => document.getElementById('adminPwdInput').focus(), 100);
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
}

function adminLogin() {
  if (document.getElementById('adminPwdInput').value === ADMIN_PASSWORD) {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminDash').style.display = 'flex';
    renderAdminDash();
  } else {
    document.getElementById('adminErr').style.display = 'block';
    document.getElementById('adminPwdInput').value = '';
  }
}

function showTab(name, btn) {
  ['overview','choices','sessions'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('cs-CZ') + ' ' + d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

function renderAdminDash() {
  const log = getLog();
  const choices = Object.values(log.choices);
  const sessions = log.sessions;
  const totalClicks = choices.reduce((s, c) => s + c.count, 0);
  const completedSessions = sessions.filter(s => s.endTitle).length;

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalClicks}</div><div class="stat-label">Celkem rozhodnutí</div></div>
    <div class="stat-card"><div class="stat-num">${sessions.length}</div><div class="stat-label">Průchodů příběhem</div></div>
    <div class="stat-card"><div class="stat-num">${completedSessions}</div><div class="stat-label">Dokončených konců</div></div>
    <div class="stat-card"><div class="stat-num">${choices.length}</div><div class="stat-label">Různých voleb</div></div>
  `;

  const sorted = [...choices].sort((a,b) => b.count - a.count).slice(0, 6);
  const maxCount = sorted[0]?.count || 1;
  document.getElementById('topChoices').innerHTML = sorted.length
    ? sorted.map(c => `
        <div class="choice-bar-row">
          <div class="choice-bar-label">${c.text}</div>
          <div class="choice-bar-wrap"><div class="choice-bar-fill" style="width:${Math.round(c.count/maxCount*100)}%"></div></div>
          <div class="choice-bar-count">${c.count}×</div>
        </div>`).join('')
    : '<div class="admin-empty">Zatím žádná data.</div>';

  const allSorted = [...choices].sort((a,b) => b.count - a.count);
  const maxAll = allSorted[0]?.count || 1;
  document.getElementById('allChoices').innerHTML = allSorted.length
    ? allSorted.map(c => `
        <div class="choice-bar-row">
          <div class="choice-bar-label" style="font-size:0.84rem">
            <span style="color:rgba(240,122,184,0.5);font-size:0.75rem">${c.fromTitle} → ${c.toTitle}</span><br>
            ${c.text}
          </div>
          <div class="choice-bar-wrap"><div class="choice-bar-fill" style="width:${Math.round(c.count/maxAll*100)}%"></div></div>
          <div class="choice-bar-count">${c.count}×</div>
        </div>`).join('')
    : '<div class="admin-empty">Zatím žádná data.</div>';

  document.getElementById('sessionsList').innerHTML = sessions.length
    ? sessions.map((s, i) => {
        const nodes = s.steps.map(step =>
          `<span class="path-node">${step.fromTitle}</span><span style="color:rgba(240,122,184,0.35);font-size:0.75rem"> › </span>`
        ).join('');
        const lastStep = s.steps[s.steps.length - 1];
        const endNode = s.endTitle
          ? `<span class="path-node ending">${s.endTitle}</span>`
          : (lastStep ? `<span class="path-node">${lastStep.toTitle}</span><span style="color:rgba(240,122,184,0.3);font-size:0.75rem"> (nedokončeno)</span>` : '');
        return `
          <div class="session-item">
            <div class="session-meta">
              <span>Průchod #${sessions.length - i} · ${fmtDate(s.start)}</span>
              <span>${s.steps.length} rozhodnutí</span>
            </div>
            <div class="session-path">${nodes}${endNode}</div>
          </div>`;
      }).join('')
    : '<div class="admin-empty">Zatím žádné průchody.</div>';
}

function clearLog() {
  if (confirm('Opravdu smazat všechna statistická data?')) {
    localStorage.removeItem(LOG_KEY);
    renderAdminDash();
  }
}
